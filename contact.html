<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <title>Contact Me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>


  <div class="hamburger" onclick="toggleMenu()">☰</div>


  <div class="side-panel" id="sidePanel">
    <nav>
      <a href="index.html" onclick="toggleMenu()">Home</a>
      <a href="aboutme.html" onclick="toggleMenu()">About Me</a>
      <a href="projects.html" onclick="toggleMenu()">Projects</a>
      <a href="contact.html" onclick="toggleMenu()">Contact Me</a>
    </nav>
  </div>


  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>


  <div id="content">
    <main>
      <header class="site-header">
        <h1>Contact Me</h1>
      </header>

      <div class="container">
        <h1>Contact</h1>

        <div class="contact-flex">
          <!-- Contact Form -->
          <form id="contactForm">
            <div class="row">
              <div class="input-group">
                <label for="first-name">First Name *</label>
                <input type="text" id="first-name" required>
              </div>
              <div class="input-group">
                <label for="last-name">Last Name *</label>
                <input type="text" id="last-name" required>
              </div>
            </div>

            <div class="input-group">
              <label for="email">Email (Optional)</label>
              <input type="email" id="email">
            </div>

            <div class="input-group">
              <label for="message">Message *</label>
              <textarea id="message" rows="5" placeholder="Maximum 250 words" required></textarea>
              <small id="wordCount">0 / 250 words</small>
            </div>

            <button type="submit">Send</button>

            <div id="success" style="display:none; margin-top: 1rem; color: green; font-weight: bold;">
              Message sent successfully!
            </div>
          </form>

          <!-- Contact Info -->
          <div class="contact-info">
            <h3>Or contact me through:</h3>
            <p>Phone: 016-923-9847 (Whatsapp Message Only Please)</p>
            <p>Email: j23039885@student.newinti.edu.my</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>

</body>

</html>
